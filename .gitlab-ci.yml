include:
  - project: $CI_INCLUDE_PATH
    ref: $CI_INCLUDE_REF
    file:
      - "/variables-subchart.gitlab-ci.yml"

  - project: $CI_INCLUDE_PATH
    ref: $CI_INCLUDE_REF
    file:
      - "/test-subchart.gitlab-ci.yml"

  - project: $CI_INCLUDE_PATH
    ref: $CI_INCLUDE_REF
    file:
      - "/publish-subchart.gitlab-ci.yml"

  - project: $CI_INCLUDE_PATH
    ref: $CI_INCLUDE_REF
    file:
      - "/sign-subchart.gitlab-ci.yml"

stages:
  - lint
  - tests

  - validate-tag
  - package
  - publish

  - sign
  - metadata
  - verify

variables:
  KUBECONFORM_CRD_SCHEMA_LOCATION: "https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json"
  KUBECONFORM_SKIP_KINDS: "ClusterServingRuntime,ClusterStorageContainer,InferenceGraph,InferenceService,LocalModelCache,LocalModelNodeGroup,LocalModelNode,ServingRuntime,TrainedModel"
